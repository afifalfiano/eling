services:
  postgres:
    image: postgres:16-alpine
    container_name: eling-postgres-1
    restart: always
    environment:
      POSTGRES_DB: eling
      POSTGRES_USER: eling
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eling"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: eling-api-1
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"   # host Nginx proxy ke sini
    environment:
      DATABASE_URL: postgresql://eling:${POSTGRES_PASSWORD}@postgres:5432/eling
      AUTH_USERNAME: ${AUTH_USERNAME}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://${DOMAIN}
      PORT: 3000
      NODE_ENV: production
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: eling-web-1
    restart: always
    depends_on:
      - api
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: eling-caddy-1
    restart: always
    ports:
      - "127.0.0.1:8080:80"    # host Nginx proxy
      - "8081:80"              # temporary — akses langsung via http://IP:8081
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - internal

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
