# Host Nginx config — salin ke /etc/nginx/conf.d/eling.conf di VPS
# Dirancang biar jalan bareng tell-your-story (mood-tracker.conf).
# SSL via certbot, bukan Caddy (Caddy internal di :8080).

# HTTP → redirect
server {
    listen 80;
    server_name eling.pipdev.net;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name eling.pipdev.net;

    ssl_certificate     /etc/letsencrypt/live/eling.pipdev.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eling.pipdev.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── API ─────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend (via Caddy internal) ──────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Service worker — no cache
    location ~* (ngsw\.json|ngsw-worker\.js|worker-basic\.min\.js)$ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }
}
