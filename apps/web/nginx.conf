server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "0" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' https: data:; frame-ancestors 'none';" always;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1000;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Service worker — no cache
  location ~* (ngsw\.json|ngsw-worker\.js|worker-basic\.min\.js)$ {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
  }

  # Cache static assets aggressively (content-hashed filenames)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html — never cache
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
  }
}
